[build]
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Security headers ─────────────────────────────────────────────────────────
# CSP: 'unsafe-inline' em script-src é necessário pelo JSON-LD do <head> e por
# estilos inline do Vite/Tailwind. Em troca, ainda bloqueamos scripts de origens
# externas não whitelisted e 'unsafe-eval'. Migrar para nonces seria a evolução.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(), payment=(), usb=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://plausible.io; style-src 'self' 'unsafe-inline' https://api.fontshare.com https://fonts.googleapis.com; font-src 'self' https://api.fontshare.com https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://plausible.io wss://generativelanguage.googleapis.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com https://drive.google.com https://lume.ufrgs.br https://www.ufrgs.br; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
