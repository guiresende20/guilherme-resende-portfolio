[build]
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/blog/list"
  to = "/.netlify/functions/blog-list"
  status = 200

[[redirects]]
  from = "/api/blog/post/*"
  to = "/.netlify/functions/blog-post/:splat"
  status = 200

[[redirects]]
  from = "/api/blog/image/*"
  to = "/.netlify/functions/blog-image/:splat"
  status = 200

[[redirects]]
  from = "/api/blog/translate"
  to = "/.netlify/functions/blog-translate"
  status = 200

[[redirects]]
  from = "/api/blog/rss"
  to = "/.netlify/functions/blog-rss"
  status = 200

[[redirects]]
  from = "/api/blog/revalidate"
  to = "/.netlify/functions/blog-revalidate"
  status = 200

[[redirects]]
  from = "/api/blog/reindex"
  to = "/.netlify/functions/blog-reindex"
  status = 200

[[redirects]]
  from = "/api/aerolito-chat"
  to = "/.netlify/functions/aerolito-chat"
  status = 200

[[redirects]]
  from = "/api/aerolito-submit"
  to = "/.netlify/functions/aerolito-submit"
  status = 200

[[redirects]]
  from = "/api/aerolito-bullets"
  to = "/.netlify/functions/aerolito-bullets"
  status = 200

[[redirects]]
  from = "/api/aerolito-admin"
  to = "/.netlify/functions/aerolito-admin"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Security headers ─────────────────────────────────────────────────────────
# CSP: 'unsafe-inline' em script-src é necessário pelo JSON-LD do <head> e por
# estilos inline do Vite/Tailwind. Em troca, ainda bloqueamos scripts de origens
# externas não whitelisted e 'unsafe-eval'. Migrar para nonces seria a evolução.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(), payment=(), usb=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://plausible.io https://disqus.com https://*.disqus.com https://*.disquscdn.com; style-src 'self' 'unsafe-inline' https://api.fontshare.com https://fonts.googleapis.com https://*.disquscdn.com; font-src 'self' https://api.fontshare.com https://cdn.fontshare.com https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://plausible.io wss://generativelanguage.googleapis.com https://disqus.com https://*.disqus.com; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com https://drive.google.com https://lume.ufrgs.br https://www.ufrgs.br https://disqus.com https://*.disqus.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"

# Aerolito intro HTML: standalone presentation embedded via iframe in /aerolito.
# Override frame headers para permitir embedding same-origin (parent: /aerolito).
# Tambem amplia o CSP para Three.js (unpkg) e Google Fonts que essa pagina usa.
[[headers]]
  for = "/aerolito-intro.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'"
